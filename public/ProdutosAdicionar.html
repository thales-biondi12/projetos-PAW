<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="pagina-formulario">
    <div class="container py-4">
        <div class="card form-card form-card-largo">
            <div class="form-header">
                Sistema de Exercicios
            </div>

            <div class="card-body">
                <h4 class="text-center mb-4 form-title">Adicionar Produtos</h4>

                <form action="/produtos/adicionar" method="get">
                    <div class="row mb-3 produto-bloco">
                        <div class="col-md-12">
                            <h5 class="produto-titulo">Produto 1</h5>
                        </div>
                        <div class="col-md-5 mb-2">
                            <input type="text" name="nome[1]" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="preco[1]" class="form-control" placeholder="Preco">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="adicionar[1]" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>

                    <div class="row mb-3 produto-bloco">
                        <div class="col-md-12">
                            <h5 class="produto-titulo">Produto 2</h5>
                        </div>
                        <div class="col-md-5 mb-2">
                            <input type="text" name="nome[2]" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="preco[2]" class="form-control" placeholder="Preco">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="adicionar[2]" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>

                    <div class="row mb-3 produto-bloco">
                        <div class="col-md-12">
                            <h5 class="produto-titulo">Produto 3</h5>
                        </div>
                        <div class="col-md-5 mb-2">
                            <input type="text" name="nome[3]" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="preco[3]" class="form-control" placeholder="Preco">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="adicionar[3]" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>

                    <div class="row mb-3 produto-bloco">
                        <div class="col-md-12">
                            <h5 class="produto-titulo">Produto 4</h5>
                        </div>
                        <div class="col-md-5 mb-2">
                            <input type="text" name="nome[4]" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="preco[4]" class="form-control" placeholder="Preco">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="adicionar[4]" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>

                    <div class="row mb-3 produto-bloco">
                        <div class="col-md-12">
                            <h5 class="produto-titulo">Produto 5</h5>
                        </div>
                        <div class="col-md-5 mb-2">
                            <input type="text" name="nome[5]" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="preco[5]" class="form-control" placeholder="Preco">
                        </div>
                        <div class="col-md-3 mb-2">
                            <input type="text" name="adicionar[5]" class="form-control" placeholder="Quantidade">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-roxo">Adicionar</button>
                        <a href="/Produtos.html" class="btn btn-voltar">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
