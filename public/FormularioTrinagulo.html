<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="pagina-formulario">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card form-card">
            <div class="form-header">
                Sistema de Exercicios
            </div>

            <div class="card-body">
                <h2 class="form-title">Calcular Triangulo</h2>

                <form action="/triangulo/calcular" method="get">
                    <label for="ladoA" class="form-label">Lado A</label>
                    <input type="text" name="ladoA" id="ladoA" class="form-control">

                    <label for="ladoB" class="form-label">Lado B</label>
                    <input type="text" name="ladoB" id="ladoB" class="form-control">

                    <label for="ladoC" class="form-label">Lado C</label>
                    <input type="text" name="ladoC" id="ladoC" class="form-control">

                    <div class="d-grid gap-2 mt-3">
                        <input type="submit" value="Calcular" class="btn btn-roxo">

                        <div class="text-center">
                            <a href="/index.html" class="btn btn-voltar d-inline-block">
                                Voltar
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
