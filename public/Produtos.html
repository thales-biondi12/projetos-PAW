<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="pagina-formulario">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card form-card form-card-largo">
                    <div class="form-header">
                        Sistema de Exercicios
                    </div>

                    <div class="card-body">
                        <h4 class="text-center mb-4 form-title">Controle de Produtos</h4>
                        <p class="text-center texto-lilas">
                            Informe ate 5 produtos com nome, preco e quantidade de entrada.
                        </p>

                        <form action="/produtos/processar" method="get">
                            <div class="row mb-3 produto-bloco justify-content-center">
                                <div class="col-md-12">
                                    <h5 class="produto-titulo">Produto 1</h5>
                                </div>
                                <div class="col-md-5 mb-2">
                                    <input type="text" name="nome[1]" class="form-control" placeholder="Nome do produto">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <input type="text" name="preco[1]" class="form-control" placeholder="Preco">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <input type="text" name="entrada[1]" class="form-control" placeholder="Qtd entrada">
                                </div>
                            </div>

                            <div class="row mb-3 produto-bloco justify-content-center">
                                <div class="col-md-12">
                                    <h5 class="produto-titulo">Produto 2</h5>
                                </div>
                                <div class="col-md-5 mb-2">
                                    <input type="text" name="nome[2]" class="form-control" placeholder="Nome do produto">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <input type="text" name="preco[2]" class="form-control" placeholder="Preco">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <input type="text" name="entrada[2]" class="form-control" placeholder="Qtd entrada">
                                </div>
                            </div>

                            <div class="row mb-3 produto-bloco justify-content-center">
                                <div class="col-md-12">
                                    <h5 class="produto-titulo">Produto 3</h5>
                                </div>
                                <div class="col-md-5 mb-2">
                                    <input type="text" name="nome[3]" class="form-control" placeholder="Nome do produto">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <input type="text" name="preco[3]" class="form-control" placeholder="Preco">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <input type="text" name="entrada[3]" class="form-control" placeholder="Qtd entrada">
                                </div>
                            </div>

                            <div class="row mb-3 produto-bloco justify-content-center">
                                <div class="col-md-12">
                                    <h5 class="produto-titulo">Produto 4</h5>
                                </div>
                                <div class="col-md-5 mb-2">
                                    <input type="text" name="nome[4]" class="form-control" placeholder="Nome do produto">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <input type="text" name="preco[4]" class="form-control" placeholder="Preco">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <input type="text" name="entrada[4]" class="form-control" placeholder="Qtd entrada">
                                </div>
                            </div>

                            <div class="row mb-3 produto-bloco justify-content-center">
                                <div class="col-md-12">
                                    <h5 class="produto-titulo">Produto 5</h5>
                                </div>
                                <div class="col-md-5 mb-2">
                                    <input type="text" name="nome[5]" class="form-control" placeholder="Nome do produto">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <input type="text" name="preco[5]" class="form-control" placeholder="Preco">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <input type="text" name="entrada[5]" class="form-control" placeholder="Qtd entrada">
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-roxo">Calcular Estoque</button>
                                <a href="/index.html" class="btn btn-voltar">Voltar</a>
                            </div>
                        </form>
                    </div>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card form-card">
            <div class="form-header">
                Sistema de Exercicios
            </div>

            <div class="card-body">
                <h4 class="text-center mb-4 form-title">Produtos</h4>
                <p class="text-center texto-lilas">Escolha a operacao que deseja fazer.</p>

                <div class="d-grid gap-2 mt-4">
                    <a href="/ProdutosAdicionar.html" class="btn btn-roxo">Adicionar Produtos</a>
                    <a href="/ProdutosRemover.html" class="btn btn-voltar">Remover Produtos</a>
                    <a href="/index.html" class="btn btn-voltar">Voltar</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
